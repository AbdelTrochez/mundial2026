<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 180" width="100%" height="100%">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff6cc" />
      <stop offset="30%" stop-color="#fdd835" />
      <stop offset="70%" stop-color="#f57f17" />
      <stop offset="100%" stop-color="#bc5100" />
    </linearGradient>
    <linearGradient id="gold-light" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fffde7" />
      <stop offset="50%" stop-color="#fff59d" />
      <stop offset="100%" stop-color="#fbc02d" />
    </linearGradient>
    <linearGradient id="malachite" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#004d40" />
      <stop offset="50%" stop-color="#00bfa5" />
      <stop offset="100%" stop-color="#004d40" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#fbc02d" stop-opacity="0.35" />
      <stop offset="50%" stop-color="#f57f17" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#0a0f1d" stop-opacity="0" />
    </radialGradient>
    <filter id="blur-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Ambient Glow Background -->
  <circle cx="60" cy="80" r="65" fill="url(#glow)" filter="url(#blur-glow)" />

  <g transform="translate(10, 5)">
    <!-- Pedestal Base (Green Malachite Bands) -->
    <!-- Tier 1 -->
    <ellipse cx="50" cy="160" rx="32" ry="10" fill="#263238" />
    <path d="M 18,160 A 32,10 0 0,0 82,160 L 82,152 A 32,8 0 0,1 18,152 Z" fill="#1a237e" opacity="0.2" />
    
    <!-- Tier 2 & Malachite Band 1 -->
    <ellipse cx="50" cy="150" rx="28" ry="9" fill="url(#malachite)" />
    <ellipse cx="50" cy="148" rx="28" ry="9" fill="url(#gold)" />
    <ellipse cx="50" cy="144" rx="25" ry="8" fill="url(#malachite)" />
    
    <!-- Tier 3 & Malachite Band 2 -->
    <path d="M 25,144 A 25,8 0 0,0 75,144 L 70,128 A 20,6 0 0,1 30,128 Z" fill="url(#gold)" />
    <ellipse cx="50" cy="128" rx="20" ry="6" fill="url(#malachite)" />
    <ellipse cx="50" cy="126" rx="20" ry="6" fill="url(#gold-light)" />

    <!-- Trophy Cup Base / Stem -->
    <path d="M 32,126 C 32,126 30,105 38,90 C 44,78 40,65 35,55 C 32,49 32,45 35,42 C 38,39 42,42 45,47 C 48,52 50,60 50,65 C 50,60 52,52 55,47 C 58,42 62,39 65,42 C 68,45 68,49 65,55 C 60,65 56,78 62,90 C 70,105 68,126 68,126 Z" fill="url(#gold)" />

    <!-- Details on the stem (glowing ridges of the figures) -->
    <path d="M 38,124 C 38,124 35,108 42,94 C 47,84 45,70 39,60 C 37,56 38,54 40,54 C 42,54 44,57 47,63 C 50,69 50,75 50,75" fill="none" stroke="url(#gold-light)" stroke-width="2" stroke-linecap="round" />
    <path d="M 62,124 C 62,124 65,108 58,94 C 53,84 55,70 61,60 C 63,56 62,54 60,54 C 58,54 56,57 53,63 C 50,69 50,75 50,75" fill="none" stroke="url(#gold-light)" stroke-width="2" stroke-linecap="round" />

    <!-- The World Globe at the top -->
    <circle cx="50" cy="40" r="18" fill="url(#gold-light)" />
    <!-- Continent outlines / curved ridges on globe -->
    <path d="M 34,45 A 18,18 0 0,1 66,45" fill="none" stroke="#e0a800" stroke-width="1.5" opacity="0.7" />
    <path d="M 32,40 A 18,18 0 0,1 68,40" fill="none" stroke="#e0a800" stroke-width="1.5" opacity="0.7" />
    <path d="M 36,32 A 18,18 0 0,1 64,32" fill="none" stroke="#e0a800" stroke-width="1.5" opacity="0.7" />
    <!-- Vertical continent lines -->
    <path d="M 44,23 A 18,18 0 0,0 44,57" fill="none" stroke="#e0a800" stroke-width="1.2" opacity="0.5" />
    <path d="M 56,23 A 18,18 0 0,1 56,57" fill="none" stroke="#e0a800" stroke-width="1.2" opacity="0.5" />
    <path d="M 50,22 L 50,58" fill="none" stroke="#e0a800" stroke-width="1" opacity="0.4" />
    
    <!-- Shading & Highlights on Globe -->
    <path d="M 32,40 A 18,18 0 0,0 55,57 A 18,18 0 0,1 32,40" fill="#bc5100" opacity="0.15" />
    <path d="M 40,25 A 18,18 0 0,1 65,30 A 18,18 0 0,0 40,25" fill="#ffffff" opacity="0.25" />
  </g>
</svg>
